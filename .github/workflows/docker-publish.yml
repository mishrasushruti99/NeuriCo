name: Build and Push Docker Image

on:
  # Rebuild weekly (Monday 6am UTC) to pick up latest CLI tools
  schedule:
    - cron: "0 6 * * 1"

  # Rebuild on pushes to main that change Docker-related files
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "docker-compose.yml"
      - "config/VERSION"
      - "pyproject.toml"
      - "uv.lock"
      - "services/paper-finder/**"
      - ".github/workflows/docker-publish.yml"

  # Allow manual trigger
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: chicagohai/neurico

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: |
          VERSION=$(cat config/VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          echo "Claude Code version:"
          docker run --rm --entrypoint claude ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --version || true
          echo "Codex version:"
          docker run --rm --entrypoint codex ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --version || true
          echo "Gemini version:"
          docker run --rm --entrypoint gemini ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --version || true
